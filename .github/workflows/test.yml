name: Test Automation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Unit Tests & Collect Coverage
        run: npm run test:unit -- --coverage
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-coverage
          path: reports/coverage/
          retention-days: 14

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run API Tests
        run: npm run test:api

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run E2E Tests
        run: npm run test:e2e
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: reports/e2e/
          retention-days: 14

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, e2e-tests]
    if: always()
    steps:
      - name: Generate Summary
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              unit: '${{ needs.unit-tests.result }}',
              api: '${{ needs.api-tests.result }}',
              e2e: '${{ needs.e2e-tests.result }}'
            };
            
            let summary = '### Test Automation Results 📊\n\n';
            summary += '| Test Suite | Status |\n';
            summary += '|------------|--------|\n';
            
            const getIcon = (status) => status === 'success' ? '✅ Pass' : '❌ Fail';
            
            summary += `| Unit Tests | ${getIcon(results.unit)} |\n`;
            summary += `| API Tests  | ${getIcon(results.api)} |\n`;
            summary += `| E2E Tests  | ${getIcon(results.e2e)} |\n\n`;
            
            if (context.issue.number) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            } else {
              core.summary.addRaw(summary).write();
            }
